name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest -q

      - name: Verify bundled payment artifact metadata
        run: python -c "import json; m=json.load(open('artifacts/metadata.json')); assert m['model_generation']=='V3'; assert set(m['product_thresholds']) >= {'monitor','review','automatic_case'}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Use stable npm
        run: npm install --global npm@10.9.2

      - name: Install and build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci
