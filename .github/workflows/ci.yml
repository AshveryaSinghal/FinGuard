name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest -q

      - name: Verify bundled payment artifact metadata
        run: python -c "import json; m=json.load(open('artifacts/metadata.json')); assert m['model_generation']=='V3'; assert set(m['product_thresholds']) >= {'monitor','review','automatic_case'}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # - name: Install frontend dependencies
      #   working-directory: web
      #   run: npm install --no-audit --no-fund

      # - name: Build frontend
      #   working-directory: web
      #   run: npm run build
      - name: Install frontend dependencies
        working-directory: web
        run: npm install --no-audit --no-fund
             npm install --no-save vite@6.4.3 typescript@5.8.3

      # - name: Verify frontend toolchain
      #   working-directory: web
      #   run: |
      #     npm exec vite -- --version
      #     npm exec tsc -- --version

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm install --no-audit --no-fund
